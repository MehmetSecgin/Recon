name: PR Release Validation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled
      - unlabeled

permissions:
  contents: read

jobs:
  release-build:
    if: github.event.pull_request.draft == false
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release version
        id: version
        run: |
          major_count="$(jq '[.pull_request.labels[].name | select(. == "release:major")] | length' "$GITHUB_EVENT_PATH")"

          if [[ "$major_count" -eq 1 ]]; then
            bump="major"
          else
            bump="minor"
          fi

          latest_tag="$(
            git tag --list 'v*' --sort=-version:refname |
            grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' |
            head -n 1 ||
            true
          )"

          if [[ -z "$latest_tag" ]]; then
            current_version="0.0.0"
          else
            current_version="${latest_tag#v}"
          fi

          IFS='.' read -r major minor patch <<< "$current_version"

          case "$bump" in
            major)
              next_version="$((major + 1)).0.0"
              ;;
            minor)
              next_version="${major}.$((minor + 1)).0"
              ;;
          esac

          echo "version=$next_version" >> "$GITHUB_OUTPUT"

      - name: Make scripts executable
        run: chmod +x build.sh release.sh install.sh

      - name: Build release asset
        env:
          RECON_VERSION: ${{ steps.version.outputs.version }}
          RECON_BUILD_NUMBER: ${{ steps.version.outputs.version }}
        run: ./release.sh
