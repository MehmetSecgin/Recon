name: Release

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Determine release scope
        id: scope
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          COMPARE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          changed_files="$(git diff --name-only "$BASE_SHA" "$COMPARE_SHA")"

          printf 'Changed files:\n%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '^(Sources/|Info\.plist$|build\.sh$|Resources/Assets\.xcassets/)'; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine release version
        id: version
        if: steps.scope.outputs.should_release == 'true'
        run: |
          major_count="$(jq '[.pull_request.labels[].name | select(. == "release:major")] | length' "$GITHUB_EVENT_PATH")"

          if [[ "$major_count" -eq 1 ]]; then
            bump="major"
          else
            bump="minor"
          fi

          latest_tag="$(
            git tag --list 'v*' --sort=-version:refname |
            grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' |
            head -n 1 ||
            true
          )"

          if [[ -z "$latest_tag" ]]; then
            current_version="0.0.0"
          else
            current_version="${latest_tag#v}"
          fi

          IFS='.' read -r major minor patch <<< "$current_version"

          case "$bump" in
            major)
              next_version="$((major + 1)).0.0"
              ;;
            minor)
              next_version="${major}.$((minor + 1)).0"
              ;;
          esac

          echo "bump=$bump" >> "$GITHUB_OUTPUT"
          echo "version=$next_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$next_version" >> "$GITHUB_OUTPUT"

      - name: Make scripts executable
        if: steps.scope.outputs.should_release == 'true'
        run: chmod +x build.sh release.sh install.sh

      - name: Build release asset
        if: steps.scope.outputs.should_release == 'true'
        env:
          RECON_VERSION: ${{ steps.version.outputs.version }}
          RECON_BUILD_NUMBER: ${{ steps.version.outputs.version }}
        run: ./release.sh

      - name: Skip non-release changes
        if: steps.scope.outputs.should_release != 'true'
        run: echo "No shippable app files changed; skipping release."

      - name: Publish GitHub release
        if: steps.scope.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            build/Recon.app.zip \
            --target "${{ github.event.pull_request.merge_commit_sha }}" \
            --title "Recon ${{ steps.version.outputs.tag }}" \
            --notes "Released from PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
