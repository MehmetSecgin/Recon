name: PR Release Label

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled
      - ready_for_review

jobs:
  validate-release-label:
    name: release-label
    runs-on: ubuntu-latest

    steps:
      - name: Require exactly one release label
        run: |
          major_count="$(jq '[.pull_request.labels[].name | select(. == "release:major")] | length' "$GITHUB_EVENT_PATH")"
          minor_count="$(jq '[.pull_request.labels[].name | select(. == "release:minor")] | length' "$GITHUB_EVENT_PATH")"
          release_label_count=$((major_count + minor_count))

          if [[ "$release_label_count" -ne 1 ]]; then
            echo "PRs into main must include exactly one release label: release:major or release:minor." >&2
            exit 1
          fi
